server:
  port: 8080
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never

spring:
  application:
    name: distributed-priority-job-queue
  main:
    web-application-type: reactive
  lifecycle:
    timeout-per-shutdown-phase: 30s
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jobs}
    username: ${DB_USERNAME:jobs}
    password: ${DB_PASSWORD:jobs}
    pool:
      enabled: true
      initial-size: 4
      max-size: 32
      max-idle-time: 30m
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jobs}
    username: ${DB_USERNAME:jobs}
    password: ${DB_PASSWORD:jobs}
  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 20
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      lettuce:
        pool:
          enabled: true
          max-active: 32
          max-idle: 16
          min-idle: 4

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.github.diafter.jobqueue: INFO
    org.apache.kafka.clients.consumer.internals: WARN

app:
  job-queue:
    kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
      consumer-group-id: distributed-job-queue-workers
      topic-partitions: 6
      topic-replicas: 1
      max-poll-records: 32
    topics:
      high: jobs-high
      low: jobs-low
      retry-5s: jobs-retry-5s
      retry-30s: jobs-retry-30s
      retry-2m: jobs-retry-2m
      dlq: jobs-dlq
    worker:
      high-concurrency: 6
      low-concurrency: 2
      retry-concurrency: 3
      lock-ttl: 2m
      processing-timeout: 5m
    retry:
      first-delay: 5s
      second-delay: 30s
      third-delay: 2m
      default-max-attempts: 4
    outbox:
      enabled: true
      batch-size: 100
      fixed-delay-ms: 1000
      publish-concurrency: 8
